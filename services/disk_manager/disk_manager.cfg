{
    "jobs": [{
        "name": "post-fs",
        "cmds": [
            "mkdir /data/service/el1/public/disk_manager 0755 1091 1091"
        ]
    }],
    "services": [{
        "name": "disk_manager",
        "path": ["/system/bin/sa_main", "/system/profile/disk_manager.json"],
        "uid": "disk_manager",
        "gid": ["disk_manager"],
        "ondemand": true,
        "sandbox": 0,
        "secon": "u:r:disk_manager:s0",
        "apl": "system_basic",
        "permission": [
            "ohos.permission.PUBLISH_SYSTEM_COMMON_EVENT",
            "ohos.permission.MOUNT_UNMOUNT_MANAGER",
            "ohos.permission.MOUNT_FORMAT_MANAGER",
            "ohos.permission.ENCRYPT_VOLUME_MANAGER",
            "ohos.permission.STORAGE_MANAGER",
            "ohos.permission.GET_BUNDLE_INFO_PRIVILEGED",
            "ohos.permission.GET_INSTALLED_BUNDLE_LIST",
            "ohos.permission.INTERACT_ACROSS_LOCAL_ACCOUNTS",
            "ohos.permission.MANAGE_LOCAL_WORKSPACES"
        ],
        "permission_acls": []
    }]
}
